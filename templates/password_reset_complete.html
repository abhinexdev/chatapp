{% extends 'base.html' %}
{% load static %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-brand">
        <svg class="auth-logo" viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="20" r="20" fill="url(#gradAuth)" />
            <path d="M10 15h20M10 20h14M10 25h18" stroke="white" stroke-width="2.5" stroke-linecap="round" />
            <circle cx="31" cy="25" r="5" fill="#22d3ee" />
            <defs>
                <linearGradient id="gradAuth" x1="0" y1="0" x2="40" y2="40">
                    <stop offset="0%" stop-color="#6366f1" />
                    <stop offset="100%" stop-color="#8b5cf6" />
                </linearGradient>
            </defs>
        </svg>
        <h1 class="auth-title">All Done!</h1>
        <p class="auth-subtitle">Your password has been updated</p>
    </div>

    <div class="auth-card">
        <h2 class="auth-card__heading">Password Changed</h2>
        <p class="auth-card__sub">You can now sign in with your new password.</p>
        <div class="auth-footer">
            <a href="{% url 'accounts:login' %}" class="btn btn--primary btn--full">Sign In Now</a>
        </div>
    </div>
</div>
{% endblock %}
