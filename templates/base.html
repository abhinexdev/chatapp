<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#121212">
<meta name="description" content="Pulse Chat — Real-time messaging for everyone">

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pulse Chat">
<link rel="apple-touch-icon" href="/static/images/default_avatar.png">

<title>{% block title %}Pulse Chat{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
{% load static %}
<!-- Apply theme before paint to prevent flash -->
<script>
  (function(){
    var t = localStorage.getItem('pulse-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<link rel="stylesheet" href="{% static 'css/main.css' %}">
{% block extra_css %}{% endblock %}
<link rel="manifest" href="/static/manifest.json">
</head>
<body>
{% if messages %}
<div class="toast-container" id="toastContainer">
  {% for message in messages %}
  <div class="toast toast--{{ message.tags }}">{{ message }}</div>
  {% endfor %}
</div>
{% endif %}
{% block content %}{% endblock %}
<script src="{% static 'js/app.js' %}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
