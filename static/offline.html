<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | Pulse Chat</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <script>(function(){var t=localStorage.getItem('pulse-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body class="offline-body">
  <div class="offline-box">
    <svg width="64" height="64" viewBox="0 0 40 40" fill="none" style="margin:0 auto 16px">
      <circle cx="20" cy="20" r="20" fill="url(#g)"/>
      <path d="M10 15h20M10 20h14M10 25h18" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="31" cy="25" r="5" fill="#22d3ee"/>
      <defs><linearGradient id="g" x1="0" y1="0" x2="40" y2="40"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs>
    </svg>
    <h1>You're Offline</h1>
    <p>Please check your internet connection and try again.</p>
    <button id="btnRetryOffline" class="btn btn--primary">Retry Connection</button>
  </div>
  <script src="/static/js/app.js"></script>
</body>
</html>
